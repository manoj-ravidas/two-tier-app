name: docker build
on:
  workflow_call:
    secrets:
      DOCKER_PASSWORD:
        required: true
jobs:
  dockerizing-the-two-tier-app:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ vars.DOCKER_USER }}/flask-image:latest
            ${{ vars.DOCKER_USER }}/flask-image:${{ github.sha }}
