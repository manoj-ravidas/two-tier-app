name: docker build
on:
  workflow_call:
  workflow_dispatch:
jobs:
  dockerizing-the-two-tier-app:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker-build-push
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build - push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKER_USER }}/github-actions-practice:latest
            ${{ vars.DOCKER_USER }}/github-actions-practice:${{ github.sha }}
