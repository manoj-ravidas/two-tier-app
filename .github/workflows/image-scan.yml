name: image scanning
on:
    workflow_call:
        secrets:
            DOCKER_PASSWORD:
                required: true
jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: docker login
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKER_USER }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: pull fresh image
              run: docker pull ${{ vars.DOCKER_USER }}/flask-image:${{ github.sha}}

            - name: scan image
              uses: aquasecurity/trivy-action@0.35.0
              with:
                  image-ref: ${{ vars.DOCKER_USER }}/flask-image:${{ github.sha}}
                  format: table
                  severity: CRITICAL,HIGH
                  exit-code: 1
                  ignore-unfixed: true
