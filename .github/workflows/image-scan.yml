name: image scanning
on:
    workflow_call:
jobs:
    image-scan:
        runs-on: self-hosted
        steps:
            - name: docker login
              uses: docker/login-action@v4
              with:
                  username: ${{ vars.DOCKER_USER }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: scan image
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  severity: Critical
                  Exit-Code: "1"
