name: deploy-to-server
on:
    workflow_call:
        secrets:
            PROD_SERVER_HOST:
                required: true
            PROD_SERVER_SSH_USER:
                required: true
            PROD_SERVER_SSH_KEY:
                required: true

jobs:
    deploy-to-prod-server:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to prod server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.PROD_SERVER_HOST }}
                  key: ${{ secrets.PROD_SERVER_SSH_KEY }}
                  username: ${{ secrets.PROD_SERVER_SSH_USER }}
                  script: |
                      echo "Tests are done and we are deploying to prod server"
                      mkdir -p /home/ubuntu/DevOps
